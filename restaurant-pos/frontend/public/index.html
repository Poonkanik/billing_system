<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1565C0" />
    <title>RestoPOS — Restaurant Point of Sale</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #F5F7FA; }
      #root { height: 100vh; overflow: hidden; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #DDE3EA; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #B0BEC5; }
      select, input, button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
